<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f7;
            color: #333;
        }
        .container {
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .logo {
            font-size: 18px;
            font-weight: 800;
            color: #ff4747; /* Фирменный красный Ali */
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 12px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .label { color: #888; }
        .value { font-weight: 600; color: #222; }
        
        .price-tag {
            font-size: 20px;
            font-weight: bold;
            color: #e62e04;
            text-align: center;
            margin: 10px 0;
        }

        .btn-check {
            width: 100%;
            background-color: #ff4747;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-check:hover {
            background-color: #e63939;
        }
        .btn-check:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #status-area {
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            color: #666;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="logo">AliSmart Helper</span>
        </div>

        <div class="card">
            <div class="item-row">
                <span class="label">ID товара:</span>
                <span id="p-id" class="value">Определяем...</span>
            </div>
            <div id="p-price" class="price-tag">--</div>
            <div class="item-row">
                <span class="label">Рейтинг продавца:</span>
                <span id="p-rating" class="value">--</span>
            </div>
        </div>

        <button id="check-btn" class="btn-check">Проверить через API</button>
        
        <div id="status-area" id="status-text">
            Готов к анализу
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
